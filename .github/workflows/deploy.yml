name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies and build Public Site
        run: |
          cd public-site
          npm install
          npm run build -- --outDir ../deploy-dist --emptyOutDir

      - name: Install dependencies and build Studio Site
        run: |
          cd studio-site
          npm install
          npm run build -- --outDir ../deploy-dist/studio --emptyOutDir --base=/studio/

      - name: Install Functions dependencies and create .env
        run: |
          cd functions
          npm install
          echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> .env
          echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" >> .env
          echo "GOOGLE_REFRESH_TOKEN=${{ secrets.GOOGLE_REFRESH_TOKEN }}" >> .env
          echo "GOOGLE_SERVICE_ACCOUNT_JSON=${{ secrets.DRIVE_UPLOADER }}" >> .env

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting and Functions
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_EXTREME }}' > firebase-sa.json
          export GOOGLE_APPLICATION_CREDENTIALS="${GITHUB_WORKSPACE}/firebase-sa.json"
          firebase deploy --only hosting,functions --project extremestudio --non-interactive
          rm firebase-sa.json
